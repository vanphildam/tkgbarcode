<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKG Barcode Ops - Stock Inventory</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- NEW MODERN LUXURY STYLES --- */
        body {
            background: var(--bg-app);
            min-height: 100vh;
        }

        .inventory-container {
            max-width: 100%;
            margin: 0;
            width: 100%;
            padding: 2rem;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .inventory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .inventory-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
            margin: 0;
        }

        .search-container {
            position: relative;
            flex: 1;
            max-width: 350px;
        }

        .search-input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            border-radius: 99px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .search-input:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2), 0 0 0 3px rgba(37, 99, 235, 0.2);
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        /* GLASSMORPHIC CARDS */
        .inventory-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            position: relative;
            overflow: hidden;
        }

        .inventory-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .inventory-card:hover {
            border-color: rgba(37, 99, 235, 0.3);
            transform: translateY(-4px) scale(1.02);
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        }

        .inventory-card:hover::before {
            opacity: 1;
        }

        .product-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            padding-bottom: 0.5rem;
        }

        .product-info:hover .product-name {
            color: var(--accent);
        }

        .card-batches-list {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px dashed var(--border-color);
            cursor: pointer;
        }

        .batch-pill {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-app);
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            border: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .inventory-card:hover .batch-pill {
            border-color: var(--border-color);
        }

        .batch-pill .batch-qty {
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-container {
            background: rgba(20, 20, 25, 0.95);
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            transform: translateY(20px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
        }

        .modal-overlay.active .modal-container {
            transform: translateY(0) scale(1);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.25rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.5rem;
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            flex: 1;
        }

        .product-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background: white;
            border-radius: 8px;
            padding: 4px;
        }

        .product-details {
            flex: 1;
        }

        .product-name {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .product-type {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stock-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-app);
            padding: 0.75rem;
            border-radius: 10px;
            margin-top: auto;
        }

        .stock-value {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--accent);
            flex: 1;
            text-align: center;
        }

        .control-btn {
            background: var(--bg-surface-hover);
            border: none;
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .control-btn:hover {
            background: var(--accent);
        }

        .low-stock {
            border-color: rgba(239, 68, 68, 0.4) !important;
            background: linear-gradient(145deg, rgba(239, 68, 68, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
        }

        .low-stock:hover {
            box-shadow: 0 20px 25px -5px rgba(239, 68, 68, 0.15), 0 10px 10px -5px rgba(239, 68, 68, 0.05);
        }

        /* Pulsing dot animation for low stock indicator */
        @keyframes pulseDot {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 6px rgba(239, 68, 68, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        .low-stock-badge {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            font-size: 0.65rem;
            padding: 4px 8px;
            border-radius: 99px;
            font-weight: 700;
            margin-left: 10px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .low-stock-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulseDot 2s infinite;
        }

        .category-tabs {
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            padding: 0.75rem;
            margin-bottom: 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 100%;
        }

        .category-tabs::-webkit-scrollbar {
            height: 6px;
        }

        .category-tabs::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }

        .category-tabs::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        .category-tabs::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .category-tab {
            padding: 0.65rem 1.5rem;
            background: transparent;
            border: none;
            border-radius: 99px;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .category-tab:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .category-tab.active {
            color: #fff;
            background: linear-gradient(135deg, var(--accent) 0%, #1e40af 100%);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }

        .stock-input {
            width: 60px;
            background: transparent;
            border: none;
            color: var(--accent);
            font-size: 1.25rem;
            font-weight: 800;
            text-align: center;
            outline: none;
        }

        .stock-input::-webkit-inner-spin-button,
        .stock-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }


        .stock-batch {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-app);
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
        }

        .batch-date-input {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85rem;
            flex: 1;
            margin-right: 0.5rem;
            max-width: 120px;
        }

        .stock-control.mini {
            margin-top: 0;
            padding: 0;
            background: transparent;
        }

        .stock-control.mini .control-btn {
            width: 28px;
            height: 28px;
            font-size: 1rem;
        }

        .stock-control.mini .stock-input {
            width: 40px;
            font-size: 1rem;
        }

        .total-stock-display {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-left: auto;
            text-align: right;
            line-height: 1;
        }
    </style>
</head>

<body>
    <div id="app">
        <header>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <a href="index.html" class="secondary-btn" style="text-decoration: none; font-size: 0.9rem;">← Home</a>
                <div class="logo">TKGBarcodeOps</div>
            </div>
            <div class="header-actions">
                <button class="primary-btn" id="save-inventory-btn" style="background: var(--success);">Save
                    Changes</button>
            </div>
        </header>

        <main class="inventory-container">
            <div class="inventory-header">
                <h1 style="font-size: 2rem;">Stock Inventory</h1>
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="inventory-search" class="search-input" placeholder="Search products...">
                </div>
            </div>

            <div class="category-tabs" id="category-tabs">
                <div class="category-tab active" data-cat="all">All Items</div>
                <!-- Categories will be injected here -->
            </div>

            <div class="inventory-grid" id="inventory-grid">
                <!-- Products will be injected here -->
            </div>
        </main>
    </div>

    <!-- Product Batches Modal -->
    <div class="modal-overlay" id="batch-modal">
        <div class="modal-container">
            <div class="modal-header">
                <h2 id="modal-product-name">Product Name</h2>
                <button class="modal-close" id="close-modal-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="batches-container" id="modal-batches-container">
                    <!-- Batches injected here -->
                </div>
                <div id="modal-dynamic-info"
                    style="margin-top: 1rem; font-size: 0.85rem; color: var(--text-secondary); background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;">
                    <!-- Dynamic details injected here -->
                </div>
                <button class="secondary-btn" id="modal-add-batch-btn"
                    style="margin-top: 1rem; width: 100%; font-size: 0.9rem; padding: 0.75rem;">+ Add Expiry
                    Batch</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="products.js"></script>
    <script src="supabase-db.js"></script>
    <script src="inventory.js"></script>
    <script src="notifications.js"></script>
</body>

</html>
