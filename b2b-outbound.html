<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKG Barcode Ops - B2B Outbound</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: var(--bg-app);
            min-height: 100vh;
        }

        .b2b-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            animation: fadeIn 0.5s ease-out;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .form-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .input-group>div {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        select,
        input[type="number"],
        input[type="text"],
        input[type="date"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
            cursor: pointer;
            backdrop-filter: blur(8px);
            padding-right: 2.5rem;
        }

        select option {
            background: var(--bg-app);
            color: var(--text-primary);
            padding: 0.5rem;
        }

        select:hover, input[type="text"]:hover, input[type="number"]:hover, input[type="date"]:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        select:focus,
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }

        .btn-add {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1.5rem;
            height: fit-content;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .cart-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .cart-table th,
        .cart-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cart-table th {
            color: var(--text-secondary);
            font-weight: 600;
            background: rgba(0, 0, 0, 0.2);
        }

        .btn-remove {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-remove:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 2rem;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>

<body>
    <div id="app">
        <header>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <a href="index.html" class="secondary-btn" style="text-decoration: none; font-size: 0.9rem;">← Home</a>
                <div class="logo">TKGBarcodeOps</div>
            </div>
            <div>
                <span style="color: var(--text-secondary);">Wholesale / B2B Outbound</span>
            </div>
        </header>

        <main class="b2b-container">
            <div class="header">
                <h1>B2B Outbound Operations</h1>
            </div>

            <div class="form-card">
                <h3 style="margin-top: 0; color: var(--text-primary);">Order Details</h3>
                <div
                    style="display: grid; grid-template-columns: 1fr 1fr 1.5fr 1.5fr 2fr; gap: 1rem; margin-bottom: 2rem;">
                    <div>
                        <label>Date</label>
                        <input type="date" id="b2b-date">
                    </div>
                    <div>
                        <label>Time</label>
                        <input type="text" id="b2b-time" placeholder="1pm-5pm">
                    </div>
                    <div>
                        <label>Name</label>
                        <input type="text" id="b2b-name" placeholder="Client / PO #">
                    </div>
                    <div>
                        <label>Person of Contact</label>
                        <input type="text" id="b2b-contact" placeholder="Name or number">
                    </div>
                    <div>
                        <label>Address</label>
                        <input type="text" id="b2b-address" placeholder="Delivery address">
                    </div>
                </div>

                <div style="margin-bottom: 2.5rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1.5rem;">
                    <label style="display:block; margin-bottom:0.75rem; color:var(--text-secondary); font-weight:600; text-transform:uppercase; font-size:0.85rem;">Proof of Delivery Attachment</label>
                    <div style="display:flex; flex-direction:column; gap:1rem;">
                        <input type="file" id="b2b-pod-image" accept="image/*" style="width:100%; max-width:400px; padding:0.75rem; background:rgba(0,0,0,0.2); border:1px solid var(--border-color); border-radius:8px; color:var(--text-primary); cursor:pointer;">
                        
                        <div id="pod-preview-container" style="display:none; align-items:flex-end; gap:1rem;">
                            <img id="pod-preview" src="" style="max-height:120px; border-radius:8px; border:2px solid var(--accent); box-shadow:0 4px 6px rgba(0,0,0,0.3);">
                            <button class="secondary-btn" id="btn-remove-pod" style="border-color:var(--danger); color:var(--danger); padding:0.5rem 1rem;">Remove</button>
                        </div>
                    </div>
                </div>

                <h3 style="margin-top: 0; color: var(--text-primary);">Contents:</h3>

                <div class="input-group" style="align-items: flex-start;">
                    <div style="flex: 2;">
                        <label>Select Product</label>
                        <input type="hidden" id="b2b-product">
                        <button type="button" id="btn-open-catalog" style="width: 100%; padding: 0.8rem; background: rgba(59, 130, 246, 0.15); border: 1px solid var(--accent); color: var(--accent); font-size: 1rem; font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.2s;">
                            🔍 Browse Product Catalog
                        </button>
                        <div id="selected-product-label" style="font-weight: 600; color: white; display: none; background: rgba(16,185,129,0.1); padding: 0.5rem 1rem; margin-top: 0.5rem; border-radius: 8px; border: 1px solid rgba(16,185,129,0.3);">
                            <!-- Selected product format here -->
                        </div>
                    </div>
                    <div id="expiry-container" style="flex: 2; display: none;">
                        <label>Target Batch (Optional)</label>
                        <select id="b2b-expiry">
                            <option value="auto">Auto-deduct (FIFO)</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label>Quantity</label>
                        <input type="number" id="b2b-qty" min="1" value="1">
                    </div>
                    <button class="btn-add" id="btn-add-item">Add Item</button>
                </div>
            </div>

            <div class="form-card">
                <h3 style="margin-top: 0; color: var(--text-primary);">Added Contents (<span id="total-qty">0</span>
                    items)
                </h3>
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Product NAME</th>
                            <th style="width: 100px;">QTY</th>
                            <th style="width: 100px;">ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="cart-tbody">
                        <tr>
                            <td colspan="3" style="text-align: center; color: var(--text-secondary);">No items added
                                yet.</td>
                        </tr>
                    </tbody>
                </table>

                <button class="btn-submit" id="btn-submit-order" disabled>Commit B2B Outbound Order</button>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="catalog-modal" class="modal-overlay hidden" style="z-index: 10000; position:fixed; top:0; left:0; right:0; bottom:0; padding:2rem; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); display:flex; flex-direction:column;">
        <div style="background:var(--bg-app); border:1px solid rgba(255,255,255,0.1); border-radius:16px; width:100%; max-width:1100px; margin:auto; height:85vh; display:flex; flex-direction:column; overflow:hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
            <div style="display:flex; justify-content:space-between; align-items:center; padding:1.5rem 2rem; border-bottom:1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2);">
                <h2 style="margin:0; font-size:1.6rem; font-weight:700;">Product Catalog</h2>
                <button class="close-icon" id="close-catalog-btn" style="background:none; border:none; color:var(--text-secondary); font-size:2rem; cursor:pointer; transition: color 0.2s;" onmouseover="this.style.color='white'" onmouseout="this.style.color='var(--text-secondary)'">&times;</button>
            </div>
            <div style="padding:1.5rem 2rem; border-bottom:1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02);">
                <input type="text" id="catalog-search" placeholder="Search for products, categories, or variations..." style="width:100%; padding:1rem 1.5rem; border-radius:12px; border:1px solid rgba(255,255,255,0.2); background:rgba(0,0,0,0.3); color:white; font-size:1.1rem; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); transition: border-color 0.2s;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='rgba(255,255,255,0.2)'">
            </div>
            <div id="catalog-grid" style="flex:1; overflow-y:auto; padding:2rem; display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:1.5rem; align-content: start;">
                <!-- Product Cards dynamically generated here -->
            </div>
        </div>
    </div>

    <div id="toast-container" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="products.js"></script>
    <script src="supabase-db.js"></script>
    <script src="b2b-outbound.js"></script>
</body>

</html>
