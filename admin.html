<!-- admin.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKG Warehouse | Master Admin</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <!-- Using SheetJS for Excel parsing -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>

<body>
    <div class="app-container">

        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <span class="logo-icon">📦</span>
                <span class="logo-text">TKG WMS</span>
            </div>

            <!-- Home Button - XA -->
            <div style="padding: 0.5rem 1rem;">
                <button class="home-btn" onclick="window.location.href='index.html'">
                    ← Home
                </button>
            </div>

            <div class="nav-links">
                <button class="nav-item active" onclick="switchSection('inventory')">📦 Master Inventory</button>
                <button class="nav-item" onclick="switchSection('giftboxes')">🎁 Gift Box Recipes</button>
                <button class="nav-item" onclick="switchSection('mapping')">🔗 Marketplace Links</button>
                <button class="nav-item" onclick="switchSection('scanner')">🔍 Marketplace Scanner</button>
                <button class="nav-item" onclick="switchSection('backups')">💾 Backup & Sync</button>
            </div>
            <div class="user-info">
                <span>Developer Mode</span>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="content">
            <header class="top-bar">
                <h1 id="section-title">Master Inventory</h1>
                <div class="top-actions" style="display:flex; gap:1rem;">

                    <button class="btn btn-secondary" onclick="syncToApp()">🚀 Sync to Scanner</button>
                    <button class="btn btn-primary" onclick="openNewProductModal()">+ Create New Product</button>
                </div>
            </header>

            <!-- Search + Filter toolbar - XA-->
            <div id="inventory-toolbar" style="display:none; gap:10px; align-items:center; padding: 1rem 0;">

    <!-- Search bar -->
    <div class="search-container">
        <span class="search-icon">🔍</span>
        <input
            type="text"
            id="inventorySearch"
            class="search-input"
            placeholder="Search by name or barcode…"
            oninput="handleSearch(this.value)">
    </div>

    <!-- Filter button (only shows on inventory) -->
    <div style="position:relative;" id="filter-btn-wrap">
        <button class="btn btn-secondary" onclick="toggleFilterDropdown()">
            ⚙ Filter
            <span id="filterBadge" style="display:none; background:#378ADD; color:#fff; border-radius:10px; font-size:11px; padding:1px 6px; margin-left:4px;">0</span>
        </button>
        <div id="filterDropdown" style="display:none; position:absolute; right:0; top:100%; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:8px 0; width:200px; z-index:100; margin-top:4px;">
            <div style="font-size:11px; color:var(--text-secondary); padding:4px 14px 6px; text-transform:uppercase; letter-spacing:0.04em;">Product type</div>
            <label style="display:flex; align-items:center; gap:10px; padding:7px 14px; cursor:pointer; font-size:13px; color:white;"><input type="checkbox" value="single" onchange="updateFilters()"> Singles</label>
            <label style="display:flex; align-items:center; gap:10px; padding:7px 14px; cursor:pointer; font-size:13px; color:white;"><input type="checkbox" value="bundle" onchange="updateFilters()"> Bundle</label>
            <label style="display:flex; align-items:center; gap:10px; padding:7px 14px; cursor:pointer; font-size:13px; color:white;"><input type="checkbox" value="giftbox" onchange="updateFilters()"> Gift boxes</label>
            <hr style="margin:6px 0; border:none; border-top:1px solid var(--border);">
            <button onclick="clearFilters()" style="width:100%; background:none; border:none; color:#378ADD; font-size:12px; cursor:pointer; padding:6px;">Clear all</button>
        </div>
    </div>

</div>


            <div id="dynamic-content" class="fade-in">
                <!-- Content injected by admin.js -->
            </div>
        </main>
    </div>

    <!-- Modals for Editing (to keep the list view clean) -->
    <div id="modal-container" class="modal-overlay" style="display:none">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modal-title">Product Details</h2>
                <button onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Specialized forms injected here -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="products.js"></script>
    <script src="supabase-db.js"></script>
    <script src="admin.js"></script>
</body>

</html>
